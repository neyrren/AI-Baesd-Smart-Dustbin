<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Dustbin — Waste Classifier</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #f5f6fa;
      color: #1a1d23;
      min-height: 100vh;
      padding: 40px 24px;
      font-size: 14px;
      line-height: 1.5;
    }

    .app { max-width: 900px; margin: 0 auto; }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 32px;
      padding-bottom: 20px;
      border-bottom: 1px solid #e5e7eb;
    }

    .header-icon {
      width: 40px; height: 40px;
      background: #166534;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 20px; flex-shrink: 0;
    }

    .header h1 { font-size: 18px; font-weight: 600; color: #1a1d23; }
    .header-sub { font-size: 12px; color: #6b7280; margin-top: 2px; }

    /* Cards */
    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 24px;
    }

    /* Grid */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }

    /* Drop zone */
    .dropzone {
      border: 1.5px dashed #d1d5db;
      border-radius: 10px;
      padding: 32px 16px;
      text-align: center;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      background: #f9fafb;
    }

    .dropzone:hover, .dropzone.drag {
      background: #eff6ff;
      border-color: #3b82f6;
    }

    .dropzone i { font-size: 32px; color: #9ca3af; display: block; margin-bottom: 10px; }
    .dropzone.drag i { color: #3b82f6; }
    .dropzone p { font-size: 13px; color: #6b7280; margin-bottom: 4px; }
    .dropzone span { font-size: 11px; color: #9ca3af; }

    .preview {
      width: 100%; height: 180px;
      object-fit: contain;
      border-radius: 8px;
      display: none;
      background: #f9fafb;
    }

    .classify-btn {
      width: 100%; margin-top: 14px;
      padding: 10px;
      background: #166534;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: background 0.15s;
    }

    .classify-btn:hover { background: #14532d; }
    .classify-btn:disabled { background: #d1d5db; cursor: not-allowed; }

    /* Spinner */
    .spinner {
      display: none;
      width: 20px; height: 20px;
      border: 2px solid #e5e7eb;
      border-top-color: #166534;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 12px auto 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Result */
    .result-empty {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100%; gap: 8px;
      color: #9ca3af; font-size: 13px;
      min-height: 220px;
    }

    .result-empty i { font-size: 36px; }

    .result-content { display: none; flex-direction: column; gap: 16px; height: 100%; }

    .result-label {
      font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: #9ca3af; margin-bottom: 6px;
    }

    .result-value { font-size: 32px; font-weight: 700; line-height: 1; }
    .result-value.organic   { color: #16a34a; }
    .result-value.inorganic { color: #dc2626; }

    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 12px; border-radius: 20px;
      font-size: 11px; font-weight: 600;
      margin-top: 8px;
    }

    .badge.organic   { background: #dcfce7; color: #15803d; }
    .badge.inorganic { background: #fee2e2; color: #b91c1c; }

    .divider { height: 1px; background: #f3f4f6; }

    /* Confidence bar */
    .conf-row { display: flex; align-items: center; gap: 10px; margin-top: 6px; }
    .conf-label { font-size: 12px; color: #6b7280; min-width: 80px; }
    .bar-track { flex: 1; height: 6px; background: #f3f4f6; border-radius: 3px; overflow: hidden; }
    .bar-fill   { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
    .bar-fill.organic   { background: #16a34a; }
    .bar-fill.inorganic { background: #dc2626; }
    .conf-val { font-size: 12px; font-weight: 600; font-family: 'SF Mono', monospace; min-width: 36px; text-align: right; }

    /* Meta */
    .meta-row { display: flex; justify-content: space-between; font-size: 12px; }
    .meta-row span:first-child { color: #9ca3af; }
    .meta-row span:last-child  { color: #374151; font-weight: 500; }

    /* History */
    .history-title {
      font-size: 13px; font-weight: 600; color: #374151;
      margin-bottom: 14px;
      display: flex; align-items: center; gap: 6px;
    }

    .history-empty { font-size: 13px; color: #9ca3af; text-align: center; padding: 24px 0; }

    .history-item {
      display: grid;
      grid-template-columns: 36px 1fr auto auto;
      align-items: center; gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid #f3f4f6;
    }

    .history-item:last-child { border-bottom: none; }

    .thumb { width: 36px; height: 36px; object-fit: cover; border-radius: 6px; }

    .history-name { font-size: 12px; color: #1a1d23; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .history-time { font-size: 11px; color: #9ca3af; margin-top: 2px; }
    .history-conf { font-size: 12px; font-weight: 500; font-family: 'SF Mono', monospace; color: #6b7280; }

    .error-state {
      display: flex; flex-direction: column;
      align-items: center; gap: 8px;
      color: #dc2626; font-size: 13px;
      padding: 20px 0; text-align: center;
    }

    @media (max-width: 600px) {
      .grid-2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-icon"><i class="ti ti-leaf"></i></div>
    <div>
      <h1>Waste classifier</h1>
      <div class="header-sub">AI-Based Smart Dustbin</div>
    </div>
  </div>

  <div class="grid-2">

    <!-- Upload -->
    <div class="card">
      <div class="dropzone" id="dropzone" onclick="document.getElementById('fileInput').click()">
        <i class="ti ti-upload" id="drop-icon"></i>
        <p id="drop-text">Drop an image or click to upload</p>
        <span id="drop-sub">JPG, PNG, WEBP supported</span>
        <img id="preview" class="preview" alt="Preview"/>
      </div>
      <input type="file" id="fileInput" accept="image/*" style="display:none"/>
      <div class="spinner" id="spinner"></div>
      <button class="classify-btn" id="classifyBtn" disabled onclick="classify()">
        <i class="ti ti-cpu"></i> Classify waste
      </button>
    </div>

    <!-- Result -->
    <div class="card" style="display:flex;flex-direction:column;">
      <div class="result-empty" id="result-empty">
        <i class="ti ti-analyze"></i>
        <span>Upload an image to see results</span>
      </div>
      <div class="result-content" id="result-content">
        <div>
          <div class="result-label">Classification</div>
          <div class="result-value" id="result-value">—</div>
          <div id="result-badge"></div>
        </div>
        <div class="divider"></div>
        <div>
          <div class="result-label">Confidence</div>
          <div class="conf-row">
            <span class="conf-label">Model score</span>
            <div class="bar-track"><div class="bar-fill" id="conf-bar" style="width:0%"></div></div>
            <span class="conf-val" id="conf-val">0%</span>
          </div>
        </div>
        <div class="divider"></div>
        <div style="display:flex;flex-direction:column;gap:6px;">
          <div class="meta-row"><span>Model</span><span>MobileNetV2</span></div>
          <div class="meta-row"><span>Accuracy</span><span>94.3%</span></div>
        </div>
      </div>
    </div>

  </div>

  <!-- History -->
  <div class="card">
    <div class="history-title">
      <i class="ti ti-history" style="font-size:16px;"></i> Classification history
    </div>
    <div id="history-list">
      <p class="history-empty">No classifications yet</p>
    </div>
  </div>

</div>
<script>
  const API = 'http://127.0.0.1:8000/predict';
  let history = [];
  let selectedFile = null;

  const dropzone    = document.getElementById('dropzone');
  const fileInput   = document.getElementById('fileInput');
  const preview     = document.getElementById('preview');
  const classifyBtn = document.getElementById('classifyBtn');
  const spinner     = document.getElementById('spinner');

  function showPreview(file) {
    selectedFile = file;
    preview.src = URL.createObjectURL(file);
    preview.style.display = 'block';
    document.getElementById('drop-icon').style.display = 'none';
    document.getElementById('drop-text').style.display = 'none';
    document.getElementById('drop-sub').style.display  = 'none';
    classifyBtn.disabled = false;
    document.getElementById('result-empty').style.display   = 'flex';
    document.getElementById('result-content').style.display = 'none';
  }

  fileInput.addEventListener('change', e => { if (e.target.files[0]) showPreview(e.target.files[0]); });
  dropzone.addEventListener('dragover',  e => { e.preventDefault(); dropzone.classList.add('drag'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag'));
  dropzone.addEventListener('drop', e => {
    e.preventDefault(); dropzone.classList.remove('drag');
    if (e.dataTransfer.files[0]) showPreview(e.dataTransfer.files[0]);
  });

  async function classify() {
    if (!selectedFile) return;
    classifyBtn.disabled = true;
    spinner.style.display = 'block';
    classifyBtn.style.display = 'none';

    try {
      const fd = new FormData();
      fd.append('file', selectedFile);
      const res  = await fetch(API, { method: 'POST', body: fd });
      const data = await res.json();

      const pred = data.prediction;
      const conf = Math.round(data.confidence);

      document.getElementById('result-empty').style.display   = 'none';
      document.getElementById('result-content').style.display = 'flex';

      const rv = document.getElementById('result-value');
      rv.textContent = pred.charAt(0).toUpperCase() + pred.slice(1);
      rv.className   = 'result-value ' + pred;

      const icon = pred === 'organic' ? 'ti-leaf' : 'ti-recycle';
      document.getElementById('result-badge').innerHTML =
        `<span class="badge ${pred}"><i class="ti ${icon}"></i> ${pred}</span>`;

      document.getElementById('conf-bar').style.width = conf + '%';
      document.getElementById('conf-bar').className   = 'bar-fill ' + pred;
      document.getElementById('conf-val').textContent = conf + '%';

      const now   = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
      const thumb = URL.createObjectURL(selectedFile);
      history.unshift({ pred, conf, name: selectedFile.name, time: now, thumb });
      if (history.length > 8) history.pop();
      renderHistory();

    } catch (_) {
      document.getElementById('result-empty').style.display = 'flex';
      document.getElementById('result-empty').innerHTML =
        '<i class="ti ti-wifi-off" style="font-size:32px;color:#dc2626;"></i><span style="color:#dc2626;">Cannot reach server — is FastAPI running on port 8000?</span>';
    } finally {
      spinner.style.display    = 'none';
      classifyBtn.style.display = 'block';
      classifyBtn.disabled      = false;
    }
  }

  function renderHistory() {
    const el = document.getElementById('history-list');
    if (!history.length) { el.innerHTML = '<p class="history-empty">No classifications yet</p>'; return; }
    el.innerHTML = history.map(h => `
      <div class="history-item">
        <img src="${h.thumb}" class="thumb" alt="${h.name}"/>
        <div>
          <div class="history-name">${h.name}</div>
          <div class="history-time">${h.time}</div>
        </div>
        <span class="badge ${h.pred}"><i class="ti ${h.pred === 'organic' ? 'ti-leaf' : 'ti-recycle'}"></i> ${h.pred}</span>
        <span class="history-conf">${h.conf}%</span>
      </div>
    `).join('');
  }
</script>
</body>
</html>
